<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maestrum — Contato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange: #FF6724;
      --bone:   #F4F3EF;
      --ink:    #000000;
      --grey:   #5E5E5E;
      --grey-2: #2A2A2A;
      --grey-3: #B8B7B3;

      --sans:    "Inter Tight", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --display: "Orbitron", "Inter Tight", sans-serif;
      --mono:    "JetBrains Mono", ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bone);
      font-family: var(--sans);
      color: var(--ink);
    }

    /* ── Layout ── */
    .page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 48px;
      gap: 0;
    }

    /* ── Profile ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 420px;
    }

    .avatar-wrap {
      position: relative;
      width: 104px;
      height: 104px;
    }

    .avatar-wrap::before {
      content: "";
      position: absolute;
      inset: -4px;
      border: 2px solid var(--orange);
      border-radius: 50%;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 2px solid var(--ink);
    }

    .profile-name {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 26px;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1;
    }

    .profile-role {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey);
      text-align: center;
      margin-top: -12px;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      max-width: 420px;
      height: 1px;
      background: var(--ink);
      margin: 32px 0;
      opacity: 0.15;
    }

    /* ── Buttons ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 420px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      border: 1.5px solid var(--ink);
      background: var(--bone);
      color: var(--ink);
      text-decoration: none;
      font-family: var(--sans);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.01em;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    .link-btn:hover,
    .link-btn:focus-visible {
      background: var(--ink);
      color: var(--bone);
      outline: none;
    }

    .link-btn:active {
      background: var(--orange);
      color: var(--ink);
      border-color: var(--orange);
    }

    .link-btn .btn-label {
      flex: 1;
    }

    .link-btn .btn-arrow {
      font-family: var(--mono);
      font-size: 13px;
      opacity: 0.45;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .link-btn:hover .btn-arrow,
    .link-btn:focus-visible .btn-arrow {
      opacity: 1;
    }

    /* ── VCF / Save contact button ── */
    .vcf-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      border: 1.5px solid var(--orange);
      background: var(--orange);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.01em;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .vcf-btn:hover,
    .vcf-btn:focus-visible {
      background: var(--ink);
      color: var(--bone);
      border-color: var(--ink);
      outline: none;
    }

    .vcf-btn:active {
      background: var(--grey-2);
      border-color: var(--grey-2);
      color: var(--bone);
    }

    .vcf-btn .btn-label { flex: 1; }

    .vcf-btn .btn-icon {
      font-family: var(--mono);
      font-size: 15px;
      flex-shrink: 0;
    }

    /* ── Footer logo ── */
    .footer {
      margin-top: auto;
      padding-top: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .footer-email {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--grey);
      text-decoration: none;
    }

    .footer-email:hover { color: var(--ink); }

    .footer-logo {
      height: 28px;
      width: auto;
      opacity: 0.55;
    }

    /* ── 404 / empty state ── */
    .not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex: 1;
      text-align: center;
      padding: 40px 0;
    }

    .not-found .code {
      font-family: var(--display);
      font-weight: 900;
      font-size: 72px;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .not-found .code span { color: var(--orange); }

    .not-found .msg {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grey);
    }
  </style>
</head>
<body>

<div class="page" id="app">
  <!-- rendered by JS -->
</div>

<script>
  // ─────────────────────────────────────────────
  //  CONTACTS DATABASE
  //  Para adicionar um novo cartão, adicione uma
  //  nova entrada neste objeto e acesse via:
  //  linktree.html?contact=<key>
  // ─────────────────────────────────────────────
  const contacts = {
    perez: {
      name: "Perez",
      role: "Founder",
      avatar: "uploads/perez.jpg",
      links: [
        { label: "WhatsApp",  url: "https://wa.me/5535988830805" },
        { label: "Instagram", url: "https://instagram.com/perezdjj" },
        { label: "Maestrum Waiting List",  url: "https://maestrum.io" },
      ],
      vcf: {
        fullName:  "Perez HotBeats",
        firstName: "Perez",
        lastName:  "HotBeats",
        title:     "Founder",
        org:       "Maestrum",
        company:   "Maestrum",
        email:     "perez@maestrum.io",
        site:      "https://maestrum.io",
        phone:     "+5535988830805",
      },
      email: "perez@maestrum.io",
    },
    pet: {
      name: "Pet",
      role: "Co-Founder",
      avatar: "uploads/pet.jpg",
      links: [
        { label: "WhatsApp",  url: "https://wa.me/5511996281830" },
        { label: "Instagram", url: "https://instagram.com/pet_ianhez" },
        { label: "Maestrum Waiting List",  url: "https://maestrum.io" },
      ],
      vcf: {
        fullName:  "Pet HotBeats",
        firstName: "Pet",
        lastName:  "Hotbeats",
        title:     "Co-Founder",
        org:       "Maestrum",
        company:   "Maestrum",
        email:     "pet@maestrum.io",
        site:      "https://maestrum.io",
        phone:     "+5511996281830",
      },
      email: "pet@maestrum.io",
    },

    // Exemplo de um segundo contato:
    // joao: {
    //   name: "João Silva",
    //   role: "Designer",
    //   avatar: "uploads/joao.jpg",
    //   links: [
    //     { label: "Portfolio", url: "https://joao.com" },
    //     { label: "LinkedIn",  url: "https://linkedin.com/in/joao" },
    //     { label: "Instagram", url: "https://instagram.com/joao" },
    //   ],
    // },
  };

  // ─────────────────────────────────────────────
  //  RENDERER
  // ─────────────────────────────────────────────
  const app   = document.getElementById("app");
  const params = new URLSearchParams(window.location.search);
  const key    = (params.get("contact") || "").toLowerCase().trim();
  const data   = contacts[key];

  function renderLinks(links) {
    return links.map(({ label, url }) => `
      <a class="link-btn" href="${escHtml(url)}" target="_blank" rel="noopener noreferrer">
        <span class="btn-label">${escHtml(label)}</span>
        <span class="btn-arrow">↗</span>
      </a>
    `).join("");
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function buildVcf(v, photoBase64, photoMime) {
    const lines = [
      "BEGIN:VCARD",
      "VERSION:3.0",
      `FN:${v.fullName}`,
      `N:${v.lastName};${v.firstName};;;`,
      `TITLE:${v.title}`,
      `ORG:${v.org}`,
      `EMAIL;TYPE=WORK:${v.email}`,
      `TEL;TYPE=CELL:${v.phone}`,
      `URL:${v.site}`,
    ];

    if (photoBase64) {
      // vCard 3.0 inline photo — fold long lines at 75 chars
      const type   = (photoMime || "image/jpeg").split("/")[1].toUpperCase();
      const header = `PHOTO;ENCODING=b;TYPE=${type}:`;
      const full   = header + photoBase64;
      // fold: first line = 75 chars, continuation lines start with a space
      const chunks = [];
      chunks.push(full.slice(0, 75));
      for (let i = 75; i < full.length; i += 74) {
        chunks.push(" " + full.slice(i, i + 74));
      }
      lines.push(chunks.join("\r\n"));
    }

    lines.push("END:VCARD");
    return lines.join("\r\n");
  }

  async function imgToBase64(src) {
    const res  = await fetch(src);
    const blob = await res.blob();
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => {
        // result is "data:image/jpeg;base64,<data>" — strip the prefix
        const b64 = reader.result.split(",")[1];
        resolve({ b64, mime: blob.type });
      };
      reader.readAsDataURL(blob);
    });
  }

  async function downloadVcf(v, avatarSrc) {
    let b64 = null, mime = null;
    if (avatarSrc) {
      try {
        const img = await imgToBase64(avatarSrc);
        b64  = img.b64;
        mime = img.mime;
      } catch (_) { /* photo embed failed — skip silently */ }
    }

    const content = buildVcf(v, b64, mime);
    const blob    = new Blob([content], { type: "text/vcard;charset=utf-8" });
    const url     = URL.createObjectURL(blob);
    const a       = document.createElement("a");
    a.href        = url;
    a.download    = `${v.firstName.toLowerCase()}.vcf`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  if (data) {
    document.title = `${data.name} — Maestrum`;
    app.innerHTML = `
      <div class="profile">
        <div class="avatar-wrap">
          <img class="avatar" src="${escHtml(data.avatar)}" alt="${escHtml(data.name)}" />
        </div>
        <p class="profile-name">${escHtml(data.name)}</p>
        <p class="profile-role">${escHtml(data.role)}</p>
      </div>

      <div class="divider"></div>

      <div class="links">
        ${renderLinks(data.links)}
        ${data.vcf ? `
        <button class="vcf-btn" id="vcf-download">
          <span class="btn-label">Baixar contato</span>
          <span class="btn-icon">↓</span>
        </button>` : ""}
      </div>

      <div class="footer">
        ${data.email ? `<a class="footer-email" href="mailto:${escHtml(data.email)}">${escHtml(data.email)}</a>` : ""}
        <img class="footer-logo" src="uploads/maestrum-logotipo.svg" alt="Maestrum" />
      </div>
    `;

    if (data.vcf) {
      document.getElementById("vcf-download").addEventListener("click", () => {
        downloadVcf(data.vcf, data.avatar);
      });
    }
  } else {
    app.innerHTML = `
      <div class="not-found">
        <p class="code">4<span>0</span>4</p>
        <p class="msg">Contato não encontrado</p>
      </div>
      <div class="footer">
        <img class="footer-logo" src="uploads/maestrum-logotipo.svg" alt="Maestrum" />
      </div>
    `;
  }
</script>
</body>
</html>
